name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libssl-dev libgtk-3-dev librsvg2-dev patchelf pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - run: npm ci

      - name: Build
        run: |
          export TAURI_SIGNING_PRIVATE_KEY=""
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
          npx tauri build --target x86_64-unknown-linux-gnu 2>&1 || true
          echo "=== Bundle output ==="
          find src-tauri/target -name "*.AppImage" -o -name "*.deb" 2>/dev/null | head -20
          echo "=== Target dirs ==="
          ls -la src-tauri/target/*/release/bundle/ 2>/dev/null || echo "no bundle dirs"

      - name: Upload AppImage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/*/release/bundle/appimage/*.AppImage

      - name: Upload .deb
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/*/release/bundle/deb/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - run: npm ci

      - name: Build
        shell: bash
        run: |
          export TAURI_SIGNING_PRIVATE_KEY=""
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
          npx tauri build --target x86_64-pc-windows-msvc 2>&1 || true
          echo "=== Bundle output ==="
          find src-tauri/target -name "*.msi" -o -name "*.exe" 2>/dev/null | head -20
          echo "=== Target dirs ==="
          ls -la src-tauri/target/*/release/bundle/ 2>/dev/null || echo "no bundle dirs"

      - name: Upload MSI
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/*/release/bundle/msi/*.msi
